name: mboa_mench
description: MBOA MENCH - L'École dans la poche. Plateforme EdTech offline-first pour le Cameroun.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  smooth_page_indicator: ^1.2.0+3
  flutter_animate: ^4.5.2
  dio: ^5.7.0
  crypto: ^3.0.6
  path_provider: ^2.1.4
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  connectivity_plus: ^6.1.1
  http: ^1.2.2

  path: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
